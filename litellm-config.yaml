general_settings:
  master_key: ${LITELLM_MASTER_KEY}
  host: 0.0.0.0            # Allows connections from your Mac/local network
  request_timeout: 600
  disable_spend_logs: true
  allow_requests_on_db_unavailable: true

model_list:
  - model_name: general-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: smarter
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: orchestrator
    litellm_params:
      model: deepseek/deepseek-chat
      temperature: 0.0
      api_key: "os.environ/DEEPSEEK_API_KEY"
      drop_params: true

  - model_name: coder-senior
    litellm_params:
      model: moonshot/kimi-k2.5
      api_key: "os.environ/KIMI_API_KEY"

  - model_name: coder-junior
    litellm_params:
      model: ollama_chat/qwen3.5:9b
      api_base: http://ym2:11434
      api_key: ollama-placeholder

  - model_name: qa-specialist
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: "os.environ/DEEPSEEK_API_KEY"
      drop_params: true

litellm_settings:
  drop_params: true
  set_verbose: false